<?xml version="1.0" encoding="UTF-8"?>
<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <!-- Prozessor-Chip: Körper als Rahmen mit Die-Quadrat + je 3 Pins pro Seite.
       Einfarbig (wird vom COSMIC-Theme als symbolic eingefärbt). -->
  <path fill="#000" fill-rule="evenodd"
        d="M4 4 H12 V12 H4 Z M6 6 H10 V10 H6 Z"/>
  <rect fill="#000" x="7" y="7" width="2" height="2"/>
  <g fill="#000">
    <!-- oben -->
    <rect x="5"   y="2" width="1" height="2"/>
    <rect x="7.5" y="2" width="1" height="2"/>
    <rect x="10"  y="2" width="1" height="2"/>
    <!-- unten -->
    <rect x="5"   y="12" width="1" height="2"/>
    <rect x="7.5" y="12" width="1" height="2"/>
    <rect x="10"  y="12" width="1" height="2"/>
    <!-- links -->
    <rect x="2" y="5"   width="2" height="1"/>
    <rect x="2" y="7.5" width="2" height="1"/>
    <rect x="2" y="10"  width="2" height="1"/>
    <!-- rechts -->
    <rect x="12" y="5"   width="2" height="1"/>
    <rect x="12" y="7.5" width="2" height="1"/>
    <rect x="12" y="10"  width="2" height="1"/>
  </g>
</svg>
